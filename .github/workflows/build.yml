name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # ── Build native JNI libraries on each platform ──────────────────
  build-native:
    name: Build JNI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x86_64
            lib-name: wz_jni.dll
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            lib-name: libwz_jni.so
          - os: macos-latest
            platform: darwin
            arch: aarch64
            lib-name: libwz_jni.dylib

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_JNI=ON -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage native library
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            SRC="build/Release/${{ matrix.lib-name }}"
          else
            SRC="build/${{ matrix.lib-name }}"
          fi
          mkdir -p native-staging/${{ matrix.platform }}/${{ matrix.arch }}
          cp "$SRC" native-staging/${{ matrix.platform }}/${{ matrix.arch }}/

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: native-staging/
          retention-days: 1

  # ── Merge native libs & build JAR ────────────────────────────────
  assemble-jar:
    name: Assemble JAR
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-staging
          merge-multiple: true

      - name: Place native libraries into resources
        run: |
          rm -rf java/src/main/resources/native
          mkdir -p java/src/main/resources/native
          cp -r native-staging/* java/src/main/resources/native/
          echo "Native libs staged:"
          find java/src/main/resources/native -type f

      - name: Build JAR with Maven
        working-directory: java
        run: mvn -B package --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwz-jar
          path: java/target/*.jar
          retention-days: 7

  # ── Publish to GitHub Packages (tags only) ───────────────────────
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: assemble-jar
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-staging
          merge-multiple: true

      - name: Place native libraries into resources
        run: |
          rm -rf java/src/main/resources/native
          mkdir -p java/src/main/resources/native
          cp -r native-staging/* java/src/main/resources/native/

      - name: Publish to GitHub Packages
        working-directory: java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          sed -i "s|<version>.*</version>|<version>$TAG</version>|" pom.xml
          mvn -B deploy --no-transfer-progress \
            -Pgithub \
            -DskipTests
      
      - name: Publish to Maven Central
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        working-directory: java
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          sed -i "s|<version>.*</version>|<version>$TAG</version>|" pom.xml
          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          # Set up Maven settings for OSSRH
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>ossrh</id>
                <username>${env.OSSRH_USERNAME}</username>
                <password>${env.OSSRH_PASSWORD}</password>
              </server>
              <server>
                <id>central</id>
                <username>${env.OSSRH_USERNAME}</username>
                <password>${env.OSSRH_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          mvn -B deploy --no-transfer-progress \
            -Possrh \
            -DskipTests
