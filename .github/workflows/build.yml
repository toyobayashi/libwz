name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy-type:
        description: 'Publish as snapshot, release, or npm'
        type: choice
        required: true
        default: snapshot
        options:
          - snapshot
          - release
          - npm
      release-version:
        description: 'Version number (required for release, optional for npm, e.g. 1.0.0)'
        type: string
        required: false

jobs:
  # ── Build native JNI libraries on each platform ──────────────────
  build-native:
    name: Build JNI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || github.event.inputs.deploy-type != 'npm'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x86_64
            lib-name: wz_jni.dll
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            lib-name: libwz_jni.so
          - os: macos-latest
            platform: darwin
            arch: aarch64
            lib-name: libwz_jni.dylib

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_JNI=ON -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage native library
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            SRC="build/Release/${{ matrix.lib-name }}"
          else
            SRC="build/${{ matrix.lib-name }}"
          fi
          mkdir -p native-staging/${{ matrix.platform }}/${{ matrix.arch }}
          cp "$SRC" native-staging/${{ matrix.platform }}/${{ matrix.arch }}/

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: native-staging/
          retention-days: 1

  # ── Merge native libs & build JAR ────────────────────────────────
  assemble-jar:
    name: Assemble JAR
    runs-on: ubuntu-latest
    needs: build-native
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-staging
          merge-multiple: true

      - name: Place native libraries into resources
        run: |
          rm -rf java/src/main/resources/native
          mkdir -p java/src/main/resources/native
          cp -r native-staging/* java/src/main/resources/native/

      - name: Build JAR with Maven
        working-directory: java
        run: mvn -B package --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwz-jar
          path: java/target/*.jar
          retention-days: 7

  # ── Publish SNAPSHOT (workflow_dispatch only) ────────────────────
  publish-snapshot:
    name: Publish SNAPSHOT
    runs-on: ubuntu-latest
    needs: build-native
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-type == 'snapshot'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-staging
          merge-multiple: true

      - name: Place native libraries into resources
        run: |
          rm -rf java/src/main/resources/native
          mkdir -p java/src/main/resources/native
          cp -r native-staging/* java/src/main/resources/native/

      - name: Publish SNAPSHOT to GitHub Packages
        working-directory: java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B deploy --no-transfer-progress -Pgithub -DskipTests

      - name: Publish SNAPSHOT to Maven Central
        working-directory: java
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<SETTINGS
          <settings>
            <servers>
              <server>
                <id>ossrh</id>
                <username>${OSSRH_USERNAME}</username>
                <password>${OSSRH_PASSWORD}</password>
              </server>
              <server>
                <id>central</id>
                <username>${OSSRH_USERNAME}</username>
                <password>${OSSRH_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          mvn -B clean deploy --no-transfer-progress -DskipTests

  # ── Publish npm package (workflow_dispatch only) ────────────────
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-type == 'npm'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Set npm release version
        if: github.event.inputs.release-version != ''
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release-version }}
        run: npm pkg set version="$RELEASE_VERSION"

      - name: Publish to npm
        run: npm publish

  # ── Publish RELEASE (workflow_dispatch only) ─────────────────────
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-native
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-type == 'release'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-staging
          merge-multiple: true

      - name: Place native libraries into resources
        run: |
          rm -rf java/src/main/resources/native
          mkdir -p java/src/main/resources/native
          cp -r native-staging/* java/src/main/resources/native/

      - name: Validate version
        run: |
          V="${{ github.event.inputs.release-version }}"
          if [ -z "$V" ]; then
            echo "ERROR: release-version is required for release deploys"
            exit 1
          fi
          echo "RELEASE_VERSION=$V" >> $GITHUB_ENV

      - name: Set release version in pom.xml
        working-directory: java
        run: mvn versions:set -DnewVersion=$RELEASE_VERSION -B

      - name: Publish to GitHub Packages
        working-directory: java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B deploy --no-transfer-progress -Pgithub -DskipTests

      - name: Publish to Maven Central
        working-directory: java
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<SETTINGS
          <settings>
            <servers>
              <server>
                <id>ossrh</id>
                <username>${OSSRH_USERNAME}</username>
                <password>${OSSRH_PASSWORD}</password>
              </server>
              <server>
                <id>central</id>
                <username>${OSSRH_USERNAME}</username>
                <password>${OSSRH_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          mvn -B deploy --no-transfer-progress -Possrh -DskipTests
      
      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v$RELEASE_VERSION" -m "Release v$RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"
